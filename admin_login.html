{% extends "base.html" %}
{% block title %}Admin Login – HR RecruitAI{% endblock %}
{% block content %}
<div style="max-width:400px; margin:4rem auto;">
  <div style="text-align:center; margin-bottom:2rem;">
    <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:var(--primary); border-radius:14px; margin-bottom:1rem;">
      <span style="font-size:1.5rem; filter:brightness(0) invert(1);">🔐</span>
    </div>
    <h1 class="page-title">HR Admin Panel</h1>
    <p class="text-muted mt-1">Sign in to manage jobs and applications</p>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" name="email" class="form-control" placeholder="admin@example.com" autofocus required>
        </div>
        <div class="form-group">
          <label class="form-label">Admin Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign In →</button>
      </form>
    </div>
  </div>
  <p class="text-muted" style="text-align:center; margin-top:1rem; font-size:0.8rem;">
    
  </p>
</div>
{% endblock %}
